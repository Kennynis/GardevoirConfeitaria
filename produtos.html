<body>
    <header>
        <nav>

    <!--bootstrap-->
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    
    <!--CARROSSEL DO TOPO-->
    <main>            
            <div class="gradiente-produtos d-flex row align-items-center">

                <div class="container col-md-4" style="font-family: Gloock, serif; color: #F0C260; text-align: left; padding-top: 60px;">
                    <h1>PRO</h1>
                    <h1>DU</h1>
                    <h1>TOS</h1>
                </div>

                <div id="carouselExample" class="carousel slide ajuste-carrossel col-md-8 ">
                    <div class="carousel-inner">
                        <div class="carousel-item active">
                        <img src="/img/eclair.png" class="d-block w-100" alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="/img/macarons.png" class="d-block w-100 " alt="...">
                    </div>
                    <div class="carousel-item">
                        <img src="/img/bem-casado.png" class="d-block w-100" alt="...">
                    </div>
                </div>
                    <div>
                        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
                            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Anterior</span>
                        </button>
                        <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
                            <span class="carousel-control-next-icon" aria-hidden="true"></span>
                            <span class="visually-hidden">Próximo</span>
                        </button>
                    </div>
                </div>
                </div>
        

    
    <!--PRODUTOS CARDS-->
    
        <div class="d-flex flex-wrap gap-5  " style="justify-content: center;">
        <!--PRIMEIRA LINHA DE PRODUTOS-->
            <div>
                <card-produto
                    img="/img/macarons.jpg" descricao="Macaron Clasique">
                </card-produto>

                <card-produto
                    img="/img/macaron-personalizado.jpg" descricao="Macarron Fleur Art">
                </card-produto>

                <card-produto
                    img="/img/macaron-personalizado2.jpg" descricao="Macarron Fleur Art">

            </div>

        <!--SEGUNDA LINHA DE PRODUTOS-->

            <card-produto
                img="/img/brigadeiro-personalizado1.jpg" descricao="Brigadeiro Gourmet personalizado">
            </card-produto>

            <card-produto
                img="/img/brigadeiro-personalizado2.jpg" descricao="Brigadeiro Gourmet personalizado">
            </card-produto>

            <card-produto
                img="/img/brigadeiro-personalizado3.jpg" descricao="Brigadeiro Gourmet personalizado">

        </div>

                    img="/img/tartelete.jpg" descricao="Fruit Tartelete">
                </card-produto>

                <card-produto
                    img="/img/flor-de-acucar.jpg" descricao="Sucre Fleur">
                </card-produto>
